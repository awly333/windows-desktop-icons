<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- C. Stacked Layouts: three offset cards, dark on top, blue accent dots -->
  <!-- Back card -->
  <rect x="40" y="40" width="140" height="140" rx="22" fill="#d2d2d7"/>
  <!-- Middle card -->
  <rect x="58" y="58" width="140" height="140" rx="22" fill="#86868b"/>
  <!-- Top card (active) -->
  <rect x="76" y="76" width="140" height="140" rx="22" fill="#1d1d1f"/>
  <!-- Top card content: 3 small position dots representing a layout -->
  <circle cx="112" cy="118" r="8" fill="#2997ff"/>
  <circle cx="146" cy="146" r="8" fill="#2997ff"/>
  <circle cx="184" cy="118" r="8" fill="#2997ff"/>
</svg>
