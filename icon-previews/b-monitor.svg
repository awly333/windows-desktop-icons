<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- B. Monitor & Snapshot: graphite display with blue icon-position dots -->
  <!-- Display body -->
  <rect x="28" y="48" width="200" height="130" rx="14" fill="#1d1d1f"/>
  <!-- Stand neck -->
  <rect x="120" y="178" width="16" height="14" fill="#1d1d1f"/>
  <!-- Stand base -->
  <rect x="84" y="190" width="88" height="10" rx="5" fill="#1d1d1f"/>
  <!-- Icon-position dots inside the screen (high-luminance blue on dark) -->
  <circle cx="76"  cy="92"  r="11" fill="#2997ff"/>
  <circle cx="160" cy="100" r="11" fill="#2997ff"/>
  <circle cx="112" cy="146" r="11" fill="#2997ff"/>
</svg>
